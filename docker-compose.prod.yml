name: aura_prod

services:
  postgres:
    container_name: aura_prod_postgres

  redis:
    container_name: aura_prod_redis

  platform:
    container_name: aura_prod_platform
    ports:
      - "8000:8000"

  platform_init:
    container_name: aura_prod_platform_init

  celery_worker:
    container_name: aura_prod_celery

  frontend:
    container_name: aura_prod_frontend
    ports:
      - "8080:80"

  asterisk:
    container_name: aura_prod_asterisk
    environment:
      SIP_PORT: "5060"
      ASTERISK_RTP_START: "10000"
      ASTERISK_RTP_END: "10050"
    ports:
      - "8088:8088"
      # Production keeps the standard SIP/RTP ports.
      - target: 5060
        published: 5060
        protocol: udp
        mode: host
      - "10000-10050:10000-10050/udp"

  bridge:
    container_name: aura_prod_bridge
