; ------------------------------------------------------------------------
; pjsip.conf - LAN softphones (1000, 1001).
; Asterisk runs with network_mode: host (see docker-compose.yml) so it
; binds 0.0.0.0 and puts the correct LAN IP in SDP automatically — no
; hardcoded external_media_address needed.
; ------------------------------------------------------------------------

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=127.0.0.0/8
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

; -------------------- Extension 1000 --------------------

[1000]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw
allow=alaw
auth=1000
aors=1000
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
ice_support=no
dtmf_mode=rfc4733
; Keep NAT pinholes open on phones that stop sending when idle.
rtp_keepalive=5

[1000]
type=auth
auth_type=userpass
username=1000
password=1000pass

[1000]
type=aor
max_contacts=3
remove_existing=no
qualify_frequency=30

; -------------------- Extension 1001 --------------------

[1001]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw
allow=alaw
auth=1001
aors=1001
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
ice_support=no
dtmf_mode=rfc4733
rtp_keepalive=5

[1001]
type=auth
auth_type=userpass
username=1001
password=1001pass

[1001]
type=aor
max_contacts=3
remove_existing=no
qualify_frequency=30
