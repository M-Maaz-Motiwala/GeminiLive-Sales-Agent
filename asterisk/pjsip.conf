; ------------------------------------------------------------------------
; pjsip.conf - LAN softphones (1000–1010). Runtime uses pjsip.conf.template via entrypoint-wrap.sh.
; Asterisk runs in Docker with port-mapped SIP/RTP. EXTERNAL_IP (see
; entrypoint-wrap.sh) must be set so Contact/SDP use your PC LAN address.
; ------------------------------------------------------------------------

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Do NOT add 172.19.0.0/16 — Docker SNAT makes REGISTER source 172.19.0.1 (bad Contact).
local_net=127.0.0.0/8

; -------------------- Extension 1000 --------------------

[1000]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw
allow=alaw
auth=1000
aors=1000
direct_media=no
force_rport=yes
rewrite_contact=no
rtp_symmetric=yes
ice_support=no
dtmf_mode=rfc4733
timers=no
; Keep NAT pinholes open on phones that stop sending when idle.
rtp_keepalive=5

[1000]
type=auth
auth_type=userpass
username=1000
password=1000pass

[1000]
type=aor
max_contacts=3
remove_existing=no
qualify_frequency=30

