; ------------------------------------------------------------------------
; pjsip.conf - LAN softphones (1000, 1001, 1002).
; Docker uses pjsip.conf.template via entrypoint-wrap.sh — recreate asterisk after edits.
; Asterisk runs in Docker with port-mapped SIP/RTP. EXTERNAL_IP (see
; entrypoint-wrap.sh) must be set so Contact/SDP use your PC LAN address.
; ------------------------------------------------------------------------

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=127.0.0.0/8
local_net=172.19.0.0/16

; -------------------- Extension 1000 --------------------

[1000]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw
allow=alaw
auth=1000
aors=1000
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
ice_support=no
dtmf_mode=rfc4733
; Keep NAT pinholes open on phones that stop sending when idle.
rtp_keepalive=5

[1000]
type=auth
auth_type=userpass
username=1000
password=1000pass

[1000]
type=aor
max_contacts=3
remove_existing=no
qualify_frequency=30

