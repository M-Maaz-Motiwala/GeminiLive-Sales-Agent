[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]

; -----------------------------------------------------------------------
; Default context for all softphones.
; -----------------------------------------------------------------------
[internal]

; --- Talk to the Gemini Live agent ---
; Do NOT Answer() here. The bridge rings the caller via ARI while it
; opens a per-call Gemini session, then answers when the AI is ready.
; Fleet inbound — callbacks on the outbound caller ID / shared sales line.
exten => 700,1,NoOp(Sales fleet inbound / callback)
 same => n,Stasis(gemini-agent)
 same => n,Hangup()

; Lab aliases → same callback router (701–703 deprecated roles).
exten => 701,1,Goto(700,1)
exten => 702,1,Goto(700,1)
exten => 703,1,Goto(700,1)
exten => 704,1,Goto(700,1)

; --- Extension-to-extension calls (sanity check that SIP+RTP work) ---
exten => 1000,1,NoOp(Calling 1000)
 same => n,Dial(PJSIP/1000,30)
 same => n,Hangup()

