[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]

; -----------------------------------------------------------------------
; Default context for all softphones.
; -----------------------------------------------------------------------
[internal]

; --- Talk to the Gemini Live agent ---
; Do NOT Answer() here. The bridge rings the caller via ARI while it
; opens a per-call Gemini session, then answers when the AI is ready.
exten => 700,1,NoOp(Gemini Live agent - first active)
 same => n,Stasis(gemini-agent)
 same => n,Hangup()

exten => 701,1,NoOp(Lead Qualifier - Maya)
 same => n,Stasis(gemini-agent,lead-qualifier)
 same => n,Hangup()

exten => 702,1,NoOp(Trangotech Sales - Aria)
 same => n,Stasis(gemini-agent,trangotech-sales)
 same => n,Hangup()

exten => 703,1,NoOp(Support FAQ - Sam)
 same => n,Stasis(gemini-agent,support-faq)
 same => n,Hangup()

exten => 704,1,NoOp(Cold Outbound - Riley, inbound test)
 same => n,Stasis(gemini-agent,cold-outbound)
 same => n,Hangup()

