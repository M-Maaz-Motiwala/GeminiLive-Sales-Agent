[modules]
autoload=yes

; chan_sip was removed in Asterisk 21+, but keep this explicit in case
; an older image is ever swapped in.
noload => chan_sip.so

; We don't need the MGCP, Skinny, IAX2 stacks for this demo.
noload => chan_mgcp.so
noload => chan_skinny.so
noload => chan_iax2.so

; Make sure the bits we rely on are explicitly loaded.
load => res_pjsip.so
load => res_pjsip_session.so
load => chan_pjsip.so
load => res_http_websocket.so
load => res_ari.so
load => res_ari_channels.so
load => res_ari_bridges.so
load => res_ari_events.so
load => res_stasis.so
load => app_stasis.so
load => res_rtp_asterisk.so
